name: tests

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 22.x # active LTS, maintenance ends 2027-04-30
          - 24.x # active LTS, maintenance ends 2028-04-30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run build --if-present
      - run: npm test
        env:
          CI: true

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: package.json
      - run: npm install
      - run: npm run test:coverage
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
